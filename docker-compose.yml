version: '3.8'

services:
  app:
    build: .
    container_name: kms-app
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=sqlite:///./data/knowledge_base.db
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE=10485760
      - AI_TIMEOUT=25
      - DEBUG=False
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
